name: Print Delomboked Sources

on:
  workflow_dispatch:
    # no inputs needed here

jobs:
  delombok-and-print:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Java 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5
        with:
          distribution: zulu
          java-version: 17

      - name: Cache Maven packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2        
        
      - name: Run Delombok
        uses: sleberknight/delombok-action@56a7f9d35ad110b4c85e400353c355124f476c08
        
      - name: Print the Delomboked code
        uses: sleberknight/print-delombok@13bf5860ede3e769a836dda7804df9e08a685e55
